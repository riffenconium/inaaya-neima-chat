<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inaaya & Neima</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>Inaaya & Neima</h1>
      <p>Your private space</p>
    </div>
    <form action="/login" method="POST" class="login-form">
      <input type="text" name="username" placeholder="Name" required autocomplete="username">
      <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
    <p class="error" id="error">Incorrect name or password</p>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
